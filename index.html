<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RICHARDCORE</title>

  <style>
    :root {
      --bg: #0b1020;
      --text: #eaeaea;
      --muted: #8a93b2;
      --line: #2a3558;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 56px 20px 28px;
      flex: 0 0 auto;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 42px;
      letter-spacing: 4px;
      margin: 0 0 14px;
    }

    .line {
      width: 56px;
      height: 2px;
      background: var(--line);
      margin: 16px auto;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      letter-spacing: 1px;
      margin: 0;
    }

    main {
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    section {
      border-top: 1px solid var(--line);
      padding: 24px 20px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 500;
    }

    .text {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      border: 1px solid var(--line);
      padding: 14px;
      min-height: 92px;
    }

    .card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 16px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      flex: 0 0 auto;
    }

    @media (max-width: 820px) {
      .hero {
        padding: 48px 20px 24px;
      }

      h1 {
        font-size: 34px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: auto;
      }
    }

    @media (min-height: 900px) {
      .hero {
        padding-top: 44px;
        padding-bottom: 22px;
      }

      section {
        padding-top: 20px;
        padding-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="container">
        <h1>RICHARDCORE</h1>
        <div class="line"></div>
        <p class="subtitle">System &amp; Software Engineering</p>
      </div>
    </div>

    <main>
      <section>
        <div class="wrap">
          <h2>About</h2>
          <p class="text">Modular platform for building and using independent online tools.</p>
        </div>
      </section>

      <section>
        <div class="wrap">
          <h2>Focus</h2>
          <div class="grid">
            <div class="card">
              <strong>Tools</strong>
              <span class="text">Independent modules</span>
            </div>
            <div class="card">
              <strong>Systems</strong>
              <span class="text">Stable core structure</span>
            </div>
            <div class="card">
              <strong>Engineering</strong>
              <span class="text">Scalable architecture</span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      © 2026 RichardCore
    </footer>
  </div>
</body>
</html>
